<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThoughtSpot – Idle Screen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08062B; overflow: hidden; height: 100vh; }

  #option3 {
    position: fixed; inset: 0; z-index: 15;
    background: #08062B;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 50%, rgba(52,109,201,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 60%, rgba(4,209,255,0.05) 0%, transparent 60%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', 'Courier New', monospace;
    padding: 0 8vw;
    transition: opacity 0.5s ease;
  }
  #option3-screen2 {
    position: fixed; inset: 0; z-index: 16;
    background: #08062B;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 50%, rgba(52,109,201,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 60%, rgba(4,209,255,0.05) 0%, transparent 60%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', 'Courier New', monospace;
    padding: 0 8vw;
    transition: opacity 0.6s ease;
  }

  /* Glassy box for Option 3 (both screens) */
  .o3-glass {
    width: 620px; max-width: 90vw;
    padding: 48px 52px;
    text-align: center;
    background: rgba(8, 12, 20, 0.45);
    backdrop-filter: blur(18px) saturate(1.3);
    -webkit-backdrop-filter: blur(18px) saturate(1.3);
    border: 1px solid rgba(52, 109, 201, 0.15);
    border-radius: 16px;
    box-shadow:
      0 0 40px rgba(0, 0, 0, 0.5),
      inset 0 0 60px rgba(52, 109, 201, 0.03),
      0 0 1px rgba(255, 255, 255, 0.08);
    font-family: 'Geist Mono', 'Courier New', monospace;
    position: relative; z-index: 1;
    transition: opacity 0.6s ease;
  }
  .o3-glass .o1-logo { margin-left: auto; margin-right: auto; }
  .o3-glass h1 {
    font-family: 'Geist Mono', 'Courier New', monospace;
    font-size: 1.55rem; font-weight: 600;
    color: #eef0f4; line-height: 1.45;
    margin-bottom: 18px; letter-spacing: -0.01em;
  }
  .o3-glass p {
    font-family: 'Geist Mono', 'Courier New', monospace;
    color: #6b7a99; font-size: 0.88rem;
    line-height: 1.6; margin-bottom: 6px;
  }
  .o3-glass .o1-captcha { justify-content: center; }
  .o3-btn-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
  .o3-btn {
    display: inline-block; padding: 10px 24px; border-radius: 6px;
    font-family: 'Geist Mono', 'Courier New', monospace;
    font-size: 0.82rem; font-weight: 500; letter-spacing: 0.02em;
    cursor: pointer; text-decoration: none;
    background: rgba(4,209,255,0.08); border: 1px solid rgba(4,209,255,0.25);
    color: #04D1FF; transition: background 0.25s, border-color 0.25s;
  }
  .o3-btn:hover { background: rgba(4,209,255,0.18); border-color: rgba(4,209,255,0.5); }

<body>

<!-- ThoughtSpot idle screen -->
<div id="option3">
  <div class="o3-glass">
    <img src="https://www.thoughtspot.com/images/TSNewWhite.svg" alt="ThoughtSpot" class="o1-logo">
    <h1>The platform temporarily moved to standby to optimize energy usage</h1>
    <div class="o1-captcha">
      <div class="o1-captcha-box" id="o3-captcha-box">
        <div class="o1-captcha-check">
          <div class="o1-captcha-checkbox" id="o3-captcha-checkbox"></div>
          <div class="o1-captcha-spinner" id="o3-captcha-spinner"></div>
          <div class="o1-captcha-tick" id="o3-captcha-tick">&#10003;</div>
        </div>
        <span class="o1-captcha-label">I'm not a robot</span>
      </div>
      <div class="o1-captcha-brand">
        <svg viewBox="0 0 64 64" width="28" height="28"><path fill="#3a5080" d="M32 4C16.536 4 4 16.536 4 32s12.536 28 28 28 28-12.536 28-28S47.464 4 32 4zm0 8a8 8 0 110 16 8 8 0 010-16zm14 30H18v-2c0-6 12-9.33 14-9.33S46 34 46 40v2z"/></svg>
        <div class="o1-captcha-brand-text">reCAPTCHA<br><span>Privacy - Terms</span></div>
      </div>
    </div>
    <p>Start the cluster using captcha</p>
  </div>
</div>

<!-- Option 3 Screen 2 -->
<div id="option3-screen2" style="display:none; opacity:0;">
  <div class="o3-glass">
    <img src="https://www.thoughtspot.com/images/TSNewWhite.svg" alt="ThoughtSpot" class="o1-logo">
    <h1>System &amp; services are waking up<span id="o3-dots"></span></h1>
    <div class="o3-btn-row">
      <a class="o3-btn" href="#">What's new with ThoughtSpot</a>
      <a class="o3-btn" href="#">ThoughtSpot community</a>
    </div>
  </div>
</div>

<script>
// --- DOM refs ---
const option3El = document.getElementById('option3');
const option3Screen2 = document.getElementById('option3-screen2');
const o3CaptchaBox = document.getElementById('o3-captcha-box');
const o3CaptchaCheckbox = document.getElementById('o3-captcha-checkbox');
const o3CaptchaSpinner = document.getElementById('o3-captcha-spinner');
const o3CaptchaTick = document.getElementById('o3-captcha-tick');

// --- Captcha flow (smooth crossfade) ---
o3CaptchaBox.addEventListener('click', () => {
  o3CaptchaCheckbox.style.display = 'none';
  o3CaptchaSpinner.style.display = 'block';

  setTimeout(() => {
    o3CaptchaSpinner.style.display = 'none';
    o3CaptchaTick.style.display = 'block';
    setTimeout(() => {
      option3Screen2.style.display = 'flex';
      option3Screen2.style.opacity = '0';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          option3Screen2.style.opacity = '1';
          option3El.querySelector('.o3-glass').style.opacity = '0';
        });
      });
      setTimeout(() => {
        option3El.style.display = 'none';
        option3El.querySelector('.o3-glass').style.opacity = '';
      }, 700);
    }, 500);
  }, 1500);
});
</script>
